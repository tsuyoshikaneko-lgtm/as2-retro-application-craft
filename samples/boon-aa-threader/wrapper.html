<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>boon-threader.swf</title>
  <meta name="description" content="AS2 / MTASC / Ruffle demo: Boon AA Threader">
  <meta property="og:title" content="Boon AA Threader">
  <meta property="og:description" content="A retro AS2/SWF one-button AA danmaku dodge game running through Ruffle.">
  <meta property="og:type" content="website">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">

  <!-- boon-threader.swf / AS2 / 390x640 -->
  <!-- Prefer bundled Ruffle. During local development, fall back to CDN if ./ruffle/ is not present. -->
  <script src="wrapper_config.js"></script>
  <script>
    (function () {
      function loadScript(src) {
        var script = document.createElement("script");
        script.src = src;
        script.async = false;
        document.head.appendChild(script);
        return script;
      }

      var local = loadScript("./ruffle/ruffle.js");
      local.onerror = function () {
        // Archival deploys must vendor Ruffle under ./ruffle/. This fallback to a
        // pinned CDN build is a local-dev convenience only; warn loudly so a
        // broken archival deploy is not mistaken for a self-hosted release.
        console.warn("[boon-threader] ./ruffle/ruffle.js not found; falling back to unpkg CDN (preview only). Vendor Ruffle under ./ruffle/ for archival releases.");
        loadScript("https://unpkg.com/@ruffle-rs/ruffle@0.3.0/ruffle.js");
      };
    }());
  </script>

  <style>
    :root {
      --stage-width: 390;
      --stage-height: 640;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #fff;
      color: #000;
      font-family: "MS Gothic", "Osaka", monospace;
      font-size: 14px;
      line-height: 1.6;
      -webkit-text-size-adjust: 100%;
    }

    body {
      text-align: center;
    }

    .wrap {
      display: inline-block;
      text-align: left;
      margin: 18px auto 32px;
      max-width: 100%;
      box-sizing: border-box;
      padding: 0 10px;
    }

    h1 {
      font-size: 16px;
      font-weight: normal;
      margin: 0 0 10px;
    }

    .swfbox {
      width: min(calc(var(--stage-width) * 1px), calc(100vw - 20px));
      aspect-ratio: var(--stage-width) / var(--stage-height);
      border: 1px solid #000;
      background: #fff;
      overflow: hidden;
      touch-action: none;
    }

    .swfbox object,
    .swfbox embed,
    .swfbox ruffle-player {
      display: block;
      width: 100%;
      height: 100%;
    }

    .note {
      font-size: 12px;
      margin-top: 10px;
    }

    .footer {
      font-size: 11px;
      margin-top: 18px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>boon-threader.swf</h1>

    <div class="swfbox">
      <object data="boon-threader.swf" data-boon-swf type="application/x-shockwave-flash" width="390" height="640">
        <param name="movie" value="boon-threader.swf">
        <param name="flashvars" value="">
        <param name="quality" value="high">
        <param name="scale" value="showall">
        <param name="salign" value="tl">
        <param name="allowScriptAccess" value="sameDomain">
        <p>swfを再生できませんでした。</p>
      </object>
      <script>
        if (window.BoonThreaderWrapper && window.BoonThreaderWrapper.apply) window.BoonThreaderWrapper.apply();
      </script>
    </div>

    <div class="note">
      おしている間だけ上昇します。
    </div>

    <div class="footer">
      <span data-release-label>ver.0.21</span> / AS2 / Ruffle<br>
      last update : 2026.06.18
    </div>
  </div>
</body>
</html>
